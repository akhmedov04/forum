<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PLOV//MSG</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --void:#040609;--bg:#080c12;--bg2:#0d1218;--bg3:#121820;
  --cyan:#00f5ff;--cyan-dim:#007a80;--cyan-dark:#003840;
  --pink:#ff006e;--pink-dim:#80003a;
  --yellow:#ffd60a;
  --text:#c4dce8;--text-dim:#4a6478;
  --border:#0f2030;--border-bright:#1a3348;
  --glow-cyan:0 0 10px rgba(0,245,255,.5),0 0 30px rgba(0,245,255,.2);
  --radius:4px;
}
html,body{height:100%;height:100dvh;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;}
::selection{background:rgba(0,245,255,.25);color:#fff;}

/* ── LAYOUT ── */
.app{display:flex;height:100vh;height:100dvh;width:100vw;overflow:hidden;}
.sidebar{width:320px;background:var(--bg2);border-right:1px solid var(--border-bright);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.chat-area{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.empty-chat{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--text-dim);}
.empty-chat .big{font-family:'Orbitron',sans-serif;font-size:42px;font-weight:900;color:var(--bg3);line-height:1;}

/* ── ACTIVE CHAT ── */
.active-chat{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}

/* ── SIDEBAR HEADER ── */
.sb-header{padding:10px 14px;border-bottom:1px solid var(--border-bright);display:flex;align-items:center;gap:10px;background:var(--bg3);flex-shrink:0;}
.sb-logo{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;color:var(--cyan);letter-spacing:2px;cursor:pointer;}
.sb-logo em{color:var(--pink);font-style:normal;}
.sb-actions{margin-left:auto;display:flex;gap:4px;}
.sb-btn{background:none;border:1px solid var(--border-bright);color:var(--text-dim);font-size:14px;padding:3px 8px;cursor:pointer;border-radius:var(--radius);font-family:'JetBrains Mono',monospace;transition:all .12s;}
.sb-btn:hover{border-color:var(--cyan-dim);color:var(--cyan);}
.sb-search{padding:8px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.sb-search input{width:100%;background:var(--bg);border:1px solid var(--border-bright);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;padding:7px 10px;outline:none;border-radius:var(--radius);transition:border-color .12s;}
.sb-search input:focus{border-color:var(--cyan-dim);}

/* ── CONVERSATION LIST ── */
.conv-list{flex:1;overflow-y:auto;overflow-x:hidden;}
.conv-item{display:flex;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;align-items:center;border-left:3px solid transparent;}
.conv-item:hover{background:var(--bg3);}
.conv-item.active{background:rgba(0,245,255,.05);border-left-color:var(--cyan);}
.conv-item.unread{border-left-color:var(--pink);}
.conv-avatar-wrap{position:relative;flex-shrink:0;width:40px;height:40px;}
.conv-avatar{width:40px;height:40px;border-radius:50%;background:var(--bg3);border:1px solid var(--border-bright);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:15px;font-weight:700;color:var(--cyan-dim);overflow:hidden;}
.conv-avatar img{width:100%;height:100%;object-fit:cover;}
.conv-avatar.group{border-radius:var(--radius);background:var(--cyan-dark);color:var(--cyan);font-size:11px;}
.online-dot{position:absolute;bottom:0;right:0;width:11px;height:11px;border-radius:50%;background:#22c55e;border:2px solid var(--bg2);z-index:2;}
.conv-info{flex:1;min-width:0;overflow:hidden;}
.conv-name{font-size:12px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px;}
.conv-name .time{font-size:9px;color:var(--text-dim);font-weight:400;margin-left:auto;font-family:'JetBrains Mono',monospace;flex-shrink:0;}
.conv-preview{font-size:11px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;font-family:'JetBrains Mono',monospace;}
.unread-badge{background:var(--pink);color:#fff;font-size:9px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;flex-shrink:0;}

/* ── CHAT HEADER ── */
.chat-header{padding:10px 16px;border-bottom:1px solid var(--border-bright);display:flex;align-items:center;gap:12px;background:var(--bg3);flex-shrink:0;}
.chat-header .back-btn{display:none;background:none;border:none;color:var(--cyan-dim);font-size:18px;cursor:pointer;padding:2px 6px;}
.chat-title{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:var(--cyan);letter-spacing:1px;}
.chat-subtitle{font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;}
.typing-indicator{font-size:10px;color:var(--yellow);font-family:'JetBrains Mono',monospace;animation:blink 1s step-end infinite;}
@keyframes blink{50%{opacity:.5}}

/* ── MESSAGES ── */
.messages{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:4px;min-height:0;}
.msg{display:flex;gap:8px;padding:4px 0;position:relative;max-width:75%;align-items:flex-end;}
.msg.me{align-self:flex-end;flex-direction:row-reverse;}
.msg.other{align-self:flex-start;}
.msg-avatar{width:30px;height:30px;border-radius:50%;background:var(--bg3);border:1px solid var(--border-bright);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;color:var(--cyan-dim);flex-shrink:0;overflow:hidden;}
.msg-avatar img{width:100%;height:100%;object-fit:cover;}
.msg.me .msg-avatar{display:none;}
.msg-bubble{padding:8px 12px;border-radius:12px;min-width:60px;position:relative;}
.msg.other .msg-bubble{background:var(--bg3);border:1px solid var(--border);border-bottom-left-radius:4px;}
.msg.me .msg-bubble{background:rgba(0,245,255,.1);border:1px solid var(--cyan-dark);border-bottom-right-radius:4px;}
.msg-header{display:flex;align-items:center;gap:6px;margin-bottom:2px;}
.msg.me .msg-header{flex-direction:row-reverse;}
.msg-author{font-size:11px;font-weight:600;color:var(--yellow);font-family:'JetBrains Mono',monospace;cursor:pointer;pointer-events:auto;}
.msg-author.admin{color:var(--pink);}
.msg.me .msg-author{color:var(--cyan);}
.msg-time{font-size:9px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;}
.msg-edited{font-size:9px;color:var(--text-dim);font-style:italic;}
.msg-body{font-size:13px;line-height:1.6;word-break:break-word;white-space:pre-wrap;}
.msg-body.deleted{color:var(--text-dim);font-style:italic;font-size:11px;}
.msg-image{max-width:280px;max-height:220px;border:1px solid var(--border-bright);margin-top:6px;cursor:pointer;border-radius:var(--radius);display:block;}
.msg-actions{display:none;position:absolute;top:-4px;background:var(--bg2);border:1px solid var(--border-bright);border-radius:var(--radius);overflow:hidden;z-index:5;}
.msg.other .msg-actions{right:4px;}
.msg.me .msg-actions{left:4px;}
.msg:hover .msg-actions{display:flex;}
.msg-action{background:none;border:none;color:var(--text-dim);padding:3px 7px;cursor:pointer;font-size:11px;transition:all .1s;font-family:'JetBrains Mono',monospace;}
.msg-action:hover{background:var(--bg3);color:var(--cyan);}
.msg-action.del:hover{color:var(--pink);}

/* ── CONTEXT MENU ── */
.ctx-menu{position:fixed;background:var(--bg2);border:1px solid var(--border-bright);border-radius:var(--radius);z-index:300;min-width:160px;box-shadow:0 4px 20px rgba(0,0,0,.4);overflow:hidden;animation:ctxIn .12s ease;}
@keyframes ctxIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.ctx-item{display:flex;align-items:center;gap:8px;padding:8px 14px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text);cursor:pointer;transition:background .1s;border:none;background:none;width:100%;text-align:left;}
.ctx-item:hover{background:rgba(0,245,255,.06);color:var(--cyan);}
.ctx-item.danger{color:var(--pink);}
.ctx-item.danger:hover{background:rgba(255,0,110,.06);}
.ctx-sep{height:1px;background:var(--border);margin:2px 0;}

/* ── REPLY PREVIEW ── */
.reply-preview{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--bg3);border-left:3px solid var(--cyan);font-size:11px;color:var(--text-dim);flex-shrink:0;}
.reply-preview .rp-author{color:var(--cyan);font-weight:600;font-family:'JetBrains Mono',monospace;}
.reply-preview .rp-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.reply-preview .rp-close{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:14px;padding:0 4px;}
.reply-preview .rp-close:hover{color:var(--pink);}

/* ── REPLY QUOTE IN MESSAGE ── */
.msg-reply-quote{background:var(--bg);border-left:2px solid var(--cyan-dim);padding:4px 8px;margin-bottom:6px;font-size:11px;border-radius:2px;cursor:pointer;}
.msg-reply-quote .rq-author{color:var(--cyan);font-weight:600;font-family:'JetBrains Mono',monospace;}
.msg-reply-quote .rq-text{color:var(--text-dim);display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:280px;}

/* ── GROUP SETTINGS PANEL ── */
.group-panel{position:absolute;right:0;top:0;bottom:0;width:300px;background:var(--bg2);border-left:1px solid var(--border-bright);z-index:50;display:flex;flex-direction:column;animation:slideIn .2s ease;overflow:hidden;}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.gp-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.gp-header .gp-title{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:var(--cyan);letter-spacing:1px;flex:1;}
.gp-header .gp-close{background:none;border:none;color:var(--text-dim);font-size:16px;cursor:pointer;}
.gp-header .gp-close:hover{color:var(--pink);}
.gp-body{flex:1;overflow-y:auto;padding:14px;}
.gp-avatar{width:64px;height:64px;border-radius:var(--radius);background:var(--bg3);border:1px solid var(--border-bright);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:22px;font-weight:700;color:var(--cyan);margin:0 auto 12px;overflow:hidden;cursor:pointer;position:relative;}
.gp-avatar img{width:100%;height:100%;object-fit:cover;}
.gp-avatar:hover::after{content:'📷';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.5);font-size:18px;}
.gp-field{margin-bottom:12px;}
.gp-field label{display:block;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.gp-field input{width:100%;background:var(--bg);border:1px solid var(--border-bright);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 8px;outline:none;border-radius:var(--radius);}
.gp-field input:focus{border-color:var(--cyan-dim);}
.gp-member{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);}
.gp-member .gm-name{font-size:11px;font-family:'JetBrains Mono',monospace;flex:1;}
.gp-member .gm-role{font-size:9px;padding:1px 5px;text-transform:uppercase;letter-spacing:.5px;}
.gp-member .gm-role.admin{color:var(--pink);background:rgba(255,0,110,.1);border:1px solid rgba(255,0,110,.3);border-radius:2px;}
.gp-member .gm-actions{display:flex;gap:2px;}
.gp-member .gm-btn{background:none;border:1px solid var(--border-bright);color:var(--text-dim);font-size:10px;padding:2px 6px;cursor:pointer;border-radius:var(--radius);font-family:'JetBrains Mono',monospace;transition:all .1s;}
.gp-member .gm-btn:hover{border-color:var(--cyan-dim);color:var(--cyan);}
.gp-member .gm-btn.danger:hover{border-color:var(--pink);color:var(--pink);}
.msg-day-sep{text-align:center;padding:10px 0;font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;position:relative;align-self:center;}
.msg-day-sep::before,.msg-day-sep::after{content:'';position:absolute;top:50%;height:1px;width:60px;background:var(--border);}
.msg-day-sep::before{right:100%;margin-right:10px;}
.msg-day-sep::after{left:100%;margin-left:10px;}

/* ── LIGHT OVERRIDES FOR BUBBLES ── */
html.light .msg.other .msg-bubble{background:var(--bg2);border-color:var(--border-bright);}
html.light .msg.me .msg-bubble{background:rgba(0,109,117,.08);border-color:rgba(0,109,117,.2);}

/* ── INPUT BAR ── */
.input-bar{padding:10px 16px;border-top:1px solid var(--border-bright);background:var(--bg2);flex-shrink:0;}
.input-row{display:flex;gap:8px;align-items:flex-end;}
.input-row textarea{flex:1;background:var(--bg);border:1px solid var(--border-bright);color:var(--text);font-family:'Exo 2',sans-serif;font-size:13px;padding:9px 12px;outline:none;resize:none;min-height:38px;max-height:150px;border-radius:var(--radius);transition:border-color .12s;line-height:1.4;}
.input-row textarea:focus{border-color:var(--cyan-dim);}
.input-row textarea::placeholder{color:var(--text-dim);}
.send-btn{background:rgba(0,245,255,.1);border:1px solid var(--cyan-dim);color:var(--cyan);font-family:'JetBrains Mono',monospace;font-size:11px;padding:8px 14px;cursor:pointer;border-radius:var(--radius);white-space:nowrap;transition:all .12s;align-self:flex-end;}
.send-btn:hover{background:rgba(0,245,255,.2);box-shadow:var(--glow-cyan);}
.send-btn:disabled{opacity:.3;cursor:not-allowed;}
.attach-btn{background:none;border:1px solid var(--border-bright);color:var(--text-dim);font-size:16px;padding:6px 10px;cursor:pointer;border-radius:var(--radius);transition:all .12s;align-self:flex-end;}
.attach-btn:hover{border-color:var(--cyan-dim);color:var(--cyan);}
.img-preview-bar{display:flex;align-items:center;gap:8px;padding:6px 0;}
.img-preview-bar img{height:50px;border:1px solid var(--border-bright);border-radius:var(--radius);}
.img-preview-bar .remove{color:var(--pink);cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;}

/* ── MODALS ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(4,6,9,.9);z-index:300;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border-bright);border-top:2px solid var(--cyan);padding:20px;width:420px;max-width:94vw;max-height:80vh;overflow-y:auto;}
.modal-title{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:var(--cyan);margin-bottom:14px;letter-spacing:2px;}
.modal input[type=text]{width:100%;background:var(--bg);border:1px solid var(--border-bright);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;padding:8px 10px;outline:none;margin-bottom:8px;border-radius:var(--radius);}
.modal input[type=text]:focus{border-color:var(--cyan-dim);}
.user-pick{display:flex;align-items:center;gap:8px;padding:6px 8px;cursor:pointer;border:1px solid var(--border);margin-bottom:2px;border-radius:var(--radius);transition:all .1s;}
.user-pick:hover,.user-pick.selected{border-color:var(--cyan-dim);background:rgba(0,245,255,.05);}
.user-pick .uname{font-size:12px;font-family:'JetBrains Mono',monospace;}
.user-pick .check{margin-left:auto;color:var(--cyan);display:none;font-size:14px;}
.user-pick.selected .check{display:block;}
.modal-actions{display:flex;gap:8px;margin-top:14px;}
.btn{font-family:'JetBrains Mono',monospace;font-size:11px;padding:7px 14px;border:1px solid;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;border-radius:var(--radius);transition:all .12s;}
.btn:active{transform:scale(.97);}
.btn-cyan{background:rgba(0,245,255,.07);border-color:var(--cyan-dim);color:var(--cyan);}
.btn-cyan:hover{background:rgba(0,245,255,.15);box-shadow:var(--glow-cyan);}
.btn-ghost{background:transparent;border-color:var(--border-bright);color:var(--text-dim);}
.btn-ghost:hover{border-color:var(--text-dim);color:var(--text);}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;right:20px;background:var(--bg2);border:1px solid var(--cyan-dim);color:var(--cyan);padding:10px 16px;font-size:11px;z-index:400;font-family:'JetBrains Mono',monospace;box-shadow:var(--glow-cyan);border-radius:var(--radius);animation:toastIn .2s ease;}
.toast.err{border-color:var(--pink-dim);color:var(--pink);}
@keyframes toastIn{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── LOGIN SCREEN ── */
.login-screen{display:flex;align-items:center;justify-content:center;height:100vh;height:100dvh;flex-direction:column;gap:16px;padding:16px;}
.login-screen .logo{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;color:var(--cyan);letter-spacing:4px;margin-bottom:8px;}
.login-screen .logo em{color:var(--pink);font-style:normal;}
.login-box{background:var(--bg2);border:1px solid var(--border-bright);border-top:2px solid var(--cyan);padding:24px;width:340px;max-width:90vw;}
.login-box .frow{margin-bottom:10px;}
.login-box label{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.login-box input{width:100%;background:var(--bg);border:1px solid var(--border-bright);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;padding:9px 10px;outline:none;border-radius:var(--radius);}
.login-box input:focus{border-color:var(--cyan-dim);}
.login-err{color:var(--pink);font-size:11px;margin-bottom:8px;font-family:'JetBrains Mono',monospace;min-height:14px;}
.login-box .btn{width:100%;text-align:center;}

/* ── RESPONSIVE ── */
/* ── RESPONSIVE MOBILE ── */
@media(max-width:640px){
  /* Sidebar: fullscreen overlay */
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:100%;z-index:100;transform:translateX(-100%);transition:transform .2s ease;border-right:none;}
  .sidebar.open{transform:translateX(0);}

  /* Sidebar header: bigger touch targets */
  .sb-header{padding:12px 14px;gap:8px;}
  .sb-logo{font-size:15px;}
  .sb-btn{font-size:16px;padding:6px 10px;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center;}
  .theme-toggle{font-size:16px;padding:6px 8px;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center;}
  .sb-search{padding:8px 12px;}
  .sb-search input{font-size:14px;padding:10px 12px;}

  /* Conv list: bigger touch targets */
  .conv-item{padding:12px 14px;gap:10px;}
  .conv-avatar-wrap{width:44px;height:44px;}
  .conv-avatar{width:44px;height:44px;font-size:16px;}
  .conv-name{font-size:14px;}
  .conv-preview{font-size:12px;}
  .unread-badge{min-width:20px;height:20px;font-size:10px;}

  /* Chat header: show back button, bigger */
  .chat-header{padding:10px 12px;gap:8px;}
  .chat-header .back-btn{display:flex;font-size:22px;padding:4px 8px;min-width:36px;min-height:36px;align-items:center;justify-content:center;}
  .chat-title{font-size:14px;}
  .chat-subtitle{font-size:11px;}
  #ch-settings-btn{font-size:18px;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center;}

  /* Messages: full width bubbles */
  .msg{max-width:88%;gap:6px;padding:3px 0;}
  .msg-avatar{width:28px;height:28px;font-size:10px;}
  .msg-bubble{padding:8px 10px;}
  .msg-author{font-size:12px;}
  .msg-time{font-size:10px;}
  .msg-body{font-size:14px;line-height:1.5;}
  .msg-image{max-width:240px;max-height:200px;}
  .msg-day-sep{font-size:11px;padding:8px 0;}

  /* Input bar: comfortable mobile input */
  .input-bar{padding:8px 10px;}
  .input-row{gap:6px;}
  .input-row textarea{font-size:15px;padding:10px 12px;min-height:42px;-webkit-appearance:none;}
  .send-btn{padding:10px 14px;font-size:12px;min-height:42px;}
  .attach-btn{font-size:20px;padding:8px 10px;min-height:42px;}
  .reply-preview{padding:8px 12px;font-size:12px;}

  /* Context menu: bottom sheet style on mobile */
  .ctx-menu{position:fixed!important;left:8px!important;right:8px!important;bottom:8px!important;top:auto!important;width:auto!important;border-radius:12px;min-width:auto;}
  .ctx-item{padding:14px 18px;font-size:14px;}
  .ctx-sep{margin:4px 0;}

  /* Group panel: fullscreen on mobile */
  .group-panel{width:100%;left:0;}
  .gp-header{padding:12px 14px;}
  .gp-title{font-size:13px;}
  .gp-close{font-size:20px;padding:4px 8px;}
  .gp-avatar{width:72px;height:72px;font-size:26px;}
  .gp-field label{font-size:11px;}
  .gp-field input{font-size:14px;padding:10px 12px;}
  .gp-member{padding:10px 0;}
  .gp-member .gm-name{font-size:13px;}
  .gp-member .gm-btn{font-size:12px;padding:5px 10px;min-height:32px;}
  #gp-add-search{font-size:14px!important;padding:10px 12px!important;}

  /* Modals: full width */
  .modal{width:100%;max-width:100%;margin:0 8px;border-radius:12px;}
  .modal-title{font-size:14px;}
  .modal input[type=text]{font-size:14px;padding:10px 12px;}
  .user-pick{padding:10px 12px;}
  .user-pick .uname{font-size:14px;}

  .login-box{width:100%;max-width:100%;margin:0 16px;padding:20px;}

  .login-box label{font-size:11px;}
  .login-box .btn{padding:12px;font-size:13px;}
  .login-screen .logo{font-size:28px;}

  /* Toast: bottom center on mobile */
  .toast{left:16px;right:16px;bottom:80px;text-align:center;font-size:12px;}

  /* Lightbox: fullscreen */
  #lightbox img{max-width:98vw;max-height:80vh;}

  /* Hide hover effects (no mouse on mobile) */
  .msg:hover{background:transparent;}
  .msg:hover .msg-actions{display:none;}

/* ── LIGHTBOX ── */
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:999;align-items:center;justify-content:center;cursor:zoom-out;}

#lightbox img{max-width:95vw;max-height:92vh;border:1px solid var(--border-bright);}

/* ── THEME TOGGLE ── */
.theme-toggle{background:none;border:1px solid var(--border-bright);color:var(--text-dim);font-size:14px;padding:3px 7px;cursor:pointer;transition:all .12s;border-radius:var(--radius);}

<body>

<!-- Login screen -->
<div id="login-screen" class="login-screen" style="display:none">
  <div class="logo">PLOV<em>//</em>MSG</div>
  <div class="login-box">
    <div class="frow"><label>Foydalanuvchi</label><input type="text" id="l-user" autocomplete="username"></div>
    <div class="frow"><label>Parol</label><input type="password" id="l-pass" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="login-err" id="l-err"></div>
    <button class="btn btn-cyan" onclick="doLogin()">[ KIRISH ]</button>
    <div style="text-align:center;margin-top:12px">
      <a href="/" style="color:var(--cyan-dim);font-size:10px;font-family:'JetBrains Mono',monospace">◄ FORUMGA QAYTISH</a>
    </div>
  </div>
</div>

<!-- Main app -->
<div id="app" class="app" style="display:none">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sb-header">
      <span class="sb-logo" onclick="window.location='/'">PLOV<em>//</em>MSG</span>
      <div class="sb-actions">
        <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" title="Light/Dark"><span style="font-family:JetBrains Mono,monospace;font-size:11px">◑ LIGHT</span></button>
        <button class="sb-btn" onclick="openNewDM()" title="DM">✉</button>
        <button class="sb-btn" onclick="openNewGroup()" title="Group">👥</button>
        <a href="/" class="sb-btn" title="Forum" style="text-decoration:none">◄</a>
      </div>
    </div>
    <div class="sb-search">
      <input type="text" id="conv-search" placeholder="Qidirish..." oninput="filterConvs()">
    </div>
    <div class="conv-list" id="conv-list"></div>
  </div>

  <!-- Chat area -->
  <div class="chat-area" id="chat-area">
    <div class="empty-chat" id="empty-chat">
      <div class="big">MSG</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:12px" id="empty-chat-text">// suhbatni tanlang yoki yangi boshlang</div>
    </div>
    <div id="active-chat" class="active-chat" style="display:none;position:relative;">
      <div class="chat-header" id="chat-header">
        <button class="back-btn" onclick="closeChat()">◄</button>
        <div style="flex:1">
          <div class="chat-title" id="ch-title"></div>
          <div class="chat-subtitle" id="ch-subtitle"></div>
        </div>
        <button class="sb-btn" id="ch-call-btn" onclick="startVoiceCall()" style="display:none" title="Voice Call">📞</button>
        <button class="sb-btn" id="ch-settings-btn" onclick="openGroupPanel()" style="display:none" title="Settings">⚙</button>
      </div>
      <div class="messages" id="messages"></div>
      <div id="typing-area" style="display:none;padding:2px 16px;flex-shrink:0">>
        <span class="typing-indicator" id="typing-text"></span>
      </div>
      <div class="input-bar" id="input-bar">
        <div class="reply-preview" id="reply-preview" style="display:none">
          <span class="rp-author" id="rp-author"></span>
          <span class="rp-text" id="rp-text"></span>
          <button class="rp-close" onclick="cancelReply()">✕</button>
        </div>
        <div class="img-preview-bar" id="img-preview-bar" style="display:none">
          <img id="attach-preview" src="">
          <span class="remove" onclick="clearAttach()">✕ bekor</span>
        </div>
        <div class="input-row">
          <button class="attach-btn" onclick="document.getElementById('attach-input').click()">📎</button>
          <input type="file" id="attach-input" accept="image/*" style="display:none" onchange="handleAttach(this)">
          <textarea id="msg-input" rows="1" placeholder="Xabar yozing..." onkeydown="handleInputKey(event)" oninput="autoResize(this);sendTyping()"></textarea>
          <button class="send-btn" id="send-btn" onclick="sendMessage()">YUBORISH ➤</button>
        </div>
      </div>
      <!-- Jump to bottom button -->
      <button id="jump-bottom" onclick="scrollToBottom()" style="display:none;position:absolute;bottom:70px;right:20px;width:36px;height:36px;border-radius:50%;background:var(--bg2);border:1px solid var(--cyan-dark);color:var(--cyan);font-size:16px;cursor:pointer;z-index:50;display:none;align-items:center;justify-content:center;box-shadow:var(--glow-cyan); transition:all .15s;">↓</button>
      
      <!-- Group panel (absolute inside active-chat) -->
      <div class="group-panel" id="group-panel" style="display:none">
        <div class="gp-header">
          <span class="gp-title" id="gp-title">// GURUH</span>
          <button class="gp-close" onclick="closeGroupPanel()">✕</button>
        </div>
        <div class="gp-body" id="gp-body"></div>
      </div>
    </div>

</div>

  </div>
</div>

<div class="ctx-menu" id="ctx-menu" style="display:none"></div>

<div class="modal-overlay" id="profile-modal" onclick="if(event.target===this)this.classList.remove('open')">

    <div id="pm-name" style="font-family:'Orbitron',sans-serif;font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px;"></div>

    <div style="display:flex;justify-content:space-around;gap:10px;margin-bottom:16px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);">
      <div><div id="pm-threads" style="color:var(--cyan);font-weight:700;font-size:14px;">0</div>THREADS</div>
      <div><div id="pm-posts" style="color:var(--cyan);font-weight:700;font-size:14px;">0</div>POSTS</div>
      <div><div id="pm-rep" style="color:var(--yellow);font-weight:700;font-size:14px;">0</div>REP</div>
    </div>
    
    <div id="pm-bio" style="font-size:12px;color:var(--text);margin-bottom:16px;white-space:pre-wrap;background:rgba(0,0,0,0.2);padding:10px;border-radius:var(--radius);border:1px solid var(--border);text-align:left;line-height:1.4;"></div>
    
    <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);margin-bottom:16px;display:flex;justify-content:space-between;">
      <span id="pm-joined"></span>
      <span id="pm-seen"></span>
    </div>
    
    <button class="btn btn-cyan" id="pm-dm-btn" style="width:100%;">[ SEND_MESSAGE ]</button>
  </div>
</div>

<!-- Forward modal -->
<div class="modal-overlay" id="fwd-modal" onclick="if(event.target===this)this.classList.remove('open')">

    <div id="fwd-list" style="max-height:300px;overflow-y:auto"></div>

</div>

<!-- Lightbox -->
<div id="lightbox" onclick="this.classList.remove('open')">
  <img id="lb-img" src="">
</div>

<!-- Voice Call Modal -->
<div class="modal-overlay" id="call-modal">
  <div class="modal" style="text-align:center; width:300px;">
    <div class="modal-title" id="call-title">// VOICE_CALL</div>
    <div id="call-status" style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-dim);margin-bottom:16px;">Calling...</div>

</div>

// ═══════════════════════════════════════════════════
//  API & UTILS
// ═══════════════════════════════════════════════════
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin' };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch('/api' + path, opts);
  if (res.status === 401) { showLogin(); throw new Error('Not logged in'); }
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Error');
  return data;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function timeAgo(ts) {
  const s = Math.floor(Date.now()/1000) - ts;
  if (s < 60) return t('now');
  if (s < 3600) return t('min_ago', Math.floor(s/60));
  if (s < 86400) return t('hr_ago', Math.floor(s/3600));
  if (s < 604800) return t('day_ago', Math.floor(s/86400));
  return new Date(ts * 1000).toLocaleDateString(curLang === 'uz' ? 'uz' : curLang === 'ru' ? 'ru' : 'en');
}

function fmtTime(ts) {
  return new Date(ts * 1000).toLocaleTimeString('uz', { hour: '2-digit', minute: '2-digit' });
}

function fmtDate(ts) {
  const d = new Date(ts * 1000);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) return t('today');
  const y = new Date(now); y.setDate(y.getDate()-1);
  if (d.toDateString() === y.toDateString()) return t('yesterday');
  const loc = curLang === 'ru' ? 'ru' : curLang === 'uz' ? 'uz' : 'en';
  return d.toLocaleDateString(loc, { day: 'numeric', month: 'short' });
}

function linkify(text) {
  return text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:var(--cyan);text-decoration:underline;">$1</a>');
}

function toast(msg, err) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const t = document.createElement('div');
  t.className = 'toast' + (err ? ' err' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function isOnline(userId) { return onlineUserIds.includes(userId); }

function showLogin() {
  document.getElementById('login-screen').style.display = '';
  document.getElementById('app').style.display = 'none';
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
}

async function doLogin() {
  const u = document.getElementById('l-user').value.trim();
  const p = document.getElementById('l-pass').value;
  if (!u || !p) return;
  try {
    const res = await api('POST', '/auth/login', { username: u, password: p });
    me = res.user;
    showApp();
    initSocket();
    loadConversations();
    // Mobile: show sidebar after login
    if (window.innerWidth <= 640) document.getElementById('sidebar').classList.add('open');
  } catch(e) {
    document.getElementById('l-err').textContent = '// ' + e.message;
  }
}

async function checkAuth() {
  try {
    const res = await api('GET', '/auth/me');
    if (res.user) { me = res.user; return true; }
  } catch(e) {}
  return false;
}

// ═══════════════════════════════════════════════════
//  SOCKET.IO
// ═══════════════════════════════════════════════════
function initSocket() {
  socket = io({ transports: ['websocket', 'polling'] });

  socket.on('connect', () => console.log('[MSG] Socket connected'));

  socket.on('msg:new', (msg) => {
    // Update convs list
    const conv = convs.find(c => c.id === msg.conv_id);
    if (conv) {
      conv.last_message = msg;
      conv.updated_at = msg.created_at;
      conv.msg_count = (conv.msg_count || 0) + 1;
      if (msg.conv_id !== activeConvId || document.hidden) {
        conv.unread_count = (conv.unread_count || 0) + 1;
      }
      // Move to top
      convs.sort((a, b) => b.updated_at - a.updated_at);
      renderConvList();
    }
    // Append to active chat
    if (msg.conv_id === activeConvId) {
      appendMessage(msg);
      scrollToBottom();
      socket.emit('conv:read', { conv_id: activeConvId });
    }
    // Clear typing for this user
    delete typingUsers[msg.user_id];
    renderTyping();
  });

  // New conversation appeared (e.g. someone DMed us)
  socket.on('conv:new', ({ conv_id }) => {
    // Reload full conversation list to pick up the new one
    loadConversations();
  });

  socket.on('msg:edited', ({ msg_id, body, updated_at }) => {
    const el = document.getElementById('msg-' + msg_id);
    if (el) {
      const bodyEl = el.querySelector('.msg-body');
      if (bodyEl) bodyEl.innerHTML = esc(body);
      let edited = el.querySelector('.msg-edited');
      if (!edited) {
        edited = document.createElement('span');
        edited.className = 'msg-edited';
        el.querySelector('.msg-header')?.appendChild(edited);
      }
      edited.textContent = t('edited');
    }
  });

  socket.on('msg:deleted', ({ msg_id }) => {
    const el = document.getElementById('msg-' + msg_id);
    if (el) {
      const bodyEl = el.querySelector('.msg-body');
      if (bodyEl) { bodyEl.className = 'msg-body deleted'; bodyEl.textContent = t('deleted'); }
      const img = el.querySelector('.msg-image');
      if (img) img.remove();
      const actions = el.querySelector('.msg-actions');
      if (actions) actions.remove();
    }
  });

  socket.on('typing:start', ({ conv_id, user_id, username }) => {
    if (conv_id === activeConvId && user_id !== me.id) {
      typingUsers[user_id] = username;
      renderTyping();
    }
  });

  socket.on('typing:stop', ({ conv_id, user_id }) => {
    if (conv_id === activeConvId) {
      delete typingUsers[user_id];
      renderTyping();
    }
  });

  socket.on('users:online', (ids) => {
    onlineUserIds = ids;
    renderConvList();
    if (activeConvId) updateChatHeader();
  });

  // Group events
  socket.on('group:updated', async ({ conv_id }) => {
    await loadConversations();
    if (activeConvId === conv_id) updateChatHeader();
    if (groupPanelData && activeConvId === conv_id) openGroupPanel();
  });

  socket.on('group:kicked', ({ conv_id }) => {
    if (activeConvId === conv_id) { closeGroupPanel(); closeChat(); }
    loadConversations();
    toast(t('gp_kicked'), true);
  });

  socket.on('disconnect', () => console.log('[MSG] Socket disconnected'));

  // WebRTC events
  socket.on('webrtc-offer', async (data) => {
    if (activeCallConvId) return; // Already in a call
    activeCallConvId = data.conv_id;
    document.getElementById('call-modal').classList.add('open');
    document.getElementById('call-title').textContent = data.from_username;
    document.getElementById('call-status').textContent = 'Incoming call...';
    document.getElementById('call-accept-btn').style.display = 'block';
    
    // Setup peer connection
    createPeerConnection();
    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
  });

  socket.on('webrtc-answer', async (data) => {
    if (peerConnection && data.conv_id === activeCallConvId) {
      await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
      document.getElementById('call-status').textContent = 'Call connected';
    }
  });

  socket.on('webrtc-candidate', async (data) => {
    if (peerConnection && data.conv_id === activeCallConvId) {
      if (data.candidate) {
        await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
      }
    }
  });

  socket.on('webrtc-end', (data) => {
    if (data.conv_id === activeCallConvId) {
      closeCallUI();
    }
  });
}

async function loadConversations() {
  try {
    convs = await api('GET', '/messenger/conversations');
    renderConvList();
  } catch(e) { console.error(e); }
}

function getConvDisplayName(c) {
  if (c.type === 'group') return c.name || 'Guruh';
  const other = c.participants?.find(p => p.id !== me.id);
  return other?.username || '?';
}

function getConvAvatar(c) {
  if (c.type === 'group') return `<div class="conv-avatar-wrap"><div class="conv-avatar group">${esc(c.name?.slice(0,2).toUpperCase() || 'GR')}</div></div>`;
  const other = c.participants?.find(p => p.id !== me.id);
  const online = other && isOnline(other.id);
  const inner = other?.avatar_url ? `<img src="${esc(other.avatar_url)}">` : esc(other?.username?.[0]?.toUpperCase() || '?');
  return `<div class="conv-avatar-wrap"><div class="conv-avatar">${inner}</div>${online ? '<span class="online-dot"></span>' : ''}</div>`;
}

function renderConvList() {
  const el = document.getElementById('conv-list');
  const q = document.getElementById('conv-search').value.toLowerCase().trim();

  let filtered = convs;
  if (q) filtered = convs.filter(c => getConvDisplayName(c).toLowerCase().includes(q));

  el.innerHTML = filtered.length ? filtered.map(c => {
    const name = getConvDisplayName(c);
    const preview = c.last_message
      ? (c.last_message.deleted ? t('deleted') : `${c.last_message.author}: ${c.last_message.body?.slice(0,40) || t('img_label')}`)
      : t('new_conv');
    const time = c.last_message ? timeAgo(c.last_message.created_at) : '';
    const unread = c.unread_count > 0;
    return `<div class="conv-item${activeConvId === c.id ? ' active' : ''}${unread ? ' unread' : ''}" onclick="openChat(${c.id})">
      ${getConvAvatar(c)}
      <div class="conv-info">
        <div class="conv-name"><span>${esc(name)}</span><span class="time">${time}</span></div>
        <div class="conv-preview">${esc(preview)}</div>
      </div>
      ${unread ? `<div class="unread-badge">${c.unread_count}</div>` : ''}
    </div>`;
  }).join('') : `<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:11px;font-family:'JetBrains Mono',monospace">${t('no_convs')}</div>`;
}

function filterConvs() { renderConvList(); }

async function openChat(convId) {
  activeConvId = convId;
  typingUsers = {};
  msgCache = {};
  cancelReply();
  closeGroupPanel();
  document.getElementById('empty-chat').style.display = 'none';
  const ac = document.getElementById('active-chat');
  ac.style.display = 'flex';

  // Mobile: hide sidebar
  document.getElementById('sidebar').classList.remove('open');

  renderConvList();
  updateChatHeader();
  renderTyping();

  // Load messages
  const msgEl = document.getElementById('messages');
  msgEl.innerHTML = `<div style="text-align:center;padding:20px;color:var(--text-dim);font-size:11px">${t('loading')}</div>`;

  try {
    const msgs = await api('GET', `/messenger/conversations/${convId}/messages`);
    msgEl.innerHTML = '';
    let lastDate = '';
    msgs.forEach(m => {
      const d = fmtDate(m.created_at);
      if (d !== lastDate) {
        lastDate = d;
        msgEl.innerHTML += `<div class="msg-day-sep">${d}</div>`;
      }
      appendMessage(m, false);
    });
    scrollToBottom(true);
    socket.emit('conv:read', { conv_id: convId });
    // Reset unread
    const conv = convs.find(c => c.id === convId);
    if (conv) { conv.unread_count = 0; renderConvList(); }
    socket.emit('conv:join', { conv_id: convId });
  } catch(e) { msgEl.innerHTML = `<div style="text-align:center;padding:20px;color:var(--pink)">${esc(e.message)}</div>`; }

  document.getElementById('msg-input').focus();
}

// Handle pasting images directly
window.addEventListener('paste', e => {
  if (!activeConvId) return;
  const items = e.clipboardData?.items;
  if (!items) return;
  let hasImage = false;
  for (const item of items) {
    if (item.type.indexOf('image/') === 0) {
      const file = item.getAsFile();
      if (file) {
        // Create an artificial input-like object to trigger existing handleAttach method
        const mockInput = { files: [file], value: 'pasted_image' };
        handleAttach(mockInput);
        hasImage = true;
        break;
      }
    }
  }
});

// User Profile modal logic
async function showUserProfile(username) {
  try {
    const res = await api('GET', `/profile/${username}`);
    const u = res.user || res;
    const isMe = u.id === me.id;
    
    document.getElementById('pm-name').textContent = u.username;
    
    // Avatar
    const av = document.getElementById('pm-avatar');
    av.style.borderColor = u.role === 'admin' ? 'var(--pink)' : u.role === 'moderator' ? 'var(--yellow)' : 'var(--cyan)';
    av.style.color = av.style.borderColor;
    if (u.avatar_url) av.innerHTML = `<img src="${esc(u.avatar_url)}">`;
    else av.textContent = u.username[0].toUpperCase();
    
    // Role
    const rn = document.getElementById('pm-role');
    rn.textContent = u.role;
    rn.style.color = u.role === 'admin' ? 'var(--pink)' : u.role === 'moderator' ? 'var(--yellow)' : 'var(--text-dim)';
    rn.style.background = u.role === 'admin' ? 'rgba(255,0,110,0.1)' : u.role === 'moderator' ? 'rgba(255,214,10,0.1)' : 'var(--bg3)';
    rn.style.border = `1px solid ${u.role === 'admin' ? 'rgba(255,0,110,0.3)' : u.role === 'moderator' ? 'rgba(255,214,10,0.3)' : 'var(--border)'}`;
    
    // Stats
    document.getElementById('pm-threads').textContent = u.thread_count;
    document.getElementById('pm-posts').textContent = u.post_count;
    document.getElementById('pm-rep').textContent = u.reputation;
    
    // Bio
    document.getElementById('pm-bio').textContent = u.bio || '// no data provided';
    
    // Dates
    document.getElementById('pm-joined').textContent = t('joined') + ' ' + fmtDate(u.created_at);
    document.getElementById('pm-seen').textContent = t('last_seen') + ' ' + (isOnline(u.id) ? t('online') : fmtDate(u.last_seen));
    
    const dmBtn = document.getElementById('pm-dm-btn');
    dmBtn.style.display = isMe ? 'none' : 'block';
    dmBtn.onclick = () => {
      document.getElementById('profile-modal').classList.remove('open');
      startNewDM(u.id);
    }
    
    document.getElementById('profile-modal').classList.add('open');
  } catch(e) {
    toast('Profile error: ' + e.message, true);
  }
}

function closeChat() {
  activeConvId = null;
  closeGroupPanel();
  cancelReply();
  document.getElementById('empty-chat').style.display = '';
  document.getElementById('active-chat').style.display = 'none';
  document.getElementById('sidebar').classList.add('open');
  renderConvList();
}

function updateChatHeader() {
  const conv = convs.find(c => c.id === activeConvId);
  if (!conv) return;
  document.getElementById('ch-title').textContent = getConvDisplayName(conv);
  const settingsBtn = document.getElementById('ch-settings-btn');
  const titleEl = document.getElementById('ch-title');
  if (conv.type === 'group') {
    document.getElementById('ch-subtitle').textContent = t('members', conv.participants?.length || 0);
    settingsBtn.style.display = '';
    titleEl.style.cursor = 'default';
    titleEl.onclick = null;
  } else {
    const other = conv.participants?.find(p => p.id !== me.id);
    document.getElementById('ch-subtitle').textContent = other && isOnline(other.id) ? t('online') : t('offline');
    document.getElementById('ch-subtitle').style.color = other && isOnline(other.id) ? '#22c55e' : '';
    settingsBtn.style.display = 'none';
    document.getElementById('ch-call-btn').style.display = 'inline-block';
    if (other) {
      titleEl.style.cursor = 'pointer';
      titleEl.onclick = () => showUserProfile(other.username);
    }
  }
}

function appendMessage(m, scroll = false) {
  const msgEl = document.getElementById('messages');
  const isMe = m.user_id === me.id;
  const avatarInner = m.author_avatar ? `<img src="${esc(m.author_avatar)}">` : esc(m.author?.[0]?.toUpperCase() || '?');

  const conv = convs.find(c => c.id === activeConvId);
  const isGroup = conv && conv.type === 'group';
  const profileClick = isGroup ? ` style="cursor:pointer;pointer-events:auto;" onclick="event.stopPropagation(); showUserProfile('${esc(m.author)}')" ` : '';

  // Cache for reply lookups
  msgCache[m.id] = { id: m.id, author: m.author, body: m.body, image: m.image, user_id: m.user_id, deleted: m.deleted };

  // Reply quote HTML
  let replyHtml = '';
  if (m.reply_to_id && (m.reply_author || msgCache[m.reply_to_id])) {
    const rAuthor = m.reply_author || msgCache[m.reply_to_id]?.author || '?';
    const rBody = m.reply_body ?? msgCache[m.reply_to_id]?.body ?? '';
    const rText = rBody ? rBody.slice(0, 60) : (m.reply_image ? '📎' : '...');
    replyHtml = `<div class="msg-reply-quote" onclick="scrollToMsg(${m.reply_to_id})"><span class="rq-author">${esc(rAuthor)}</span><span class="rq-text">${esc(rText)}</span></div>`;
  }

  const div = document.createElement('div');
  div.className = 'msg ' + (isMe ? 'me' : 'other');
  div.id = 'msg-' + m.id;
  div.innerHTML = `
    <div class="msg-avatar"${profileClick}>${avatarInner}</div>
    <div class="msg-bubble">
      ${replyHtml}
      <div class="msg-header">
        <span class="msg-author${m.author_role === 'admin' ? ' admin' : ''}"${profileClick}>${esc(m.author)}</span>
        <span class="msg-time">${fmtTime(m.created_at)}</span>
        ${m.edited ? `<span class="msg-edited">${t('edited')}</span>` : ''}
      </div>
      ${m.deleted
        ? `<div class="msg-body deleted">${t('deleted')}</div>`
        : `<div class="msg-body">${linkify(esc(m.body || ''))}</div>
           ${m.image ? `<img class="msg-image" src="${esc(m.image)}" onclick="document.getElementById('lb-img').src=this.src;document.getElementById('lightbox').classList.add('open')">` : ''}`}
    </div>`;

  // Right-click context menu (desktop)
  if (!m.deleted) {
    div.addEventListener('contextmenu', (e) => { e.preventDefault(); showCtxMenu(e, m, isMe); });
    // Long-press for mobile
    let lpTimer = null;
    div.addEventListener('touchstart', (e) => {
      lpTimer = setTimeout(() => {
        e.preventDefault();
        const touch = e.touches[0];
        showCtxMenu({ clientX: touch.clientX, clientY: touch.clientY }, m, isMe);
      }, 500);
    }, { passive: false });
    div.addEventListener('touchend', () => clearTimeout(lpTimer));
    div.addEventListener('touchmove', () => clearTimeout(lpTimer));
  }

  msgEl.appendChild(div);
  if (scroll) scrollToBottom();
}

function scrollToBottom(instant) {
  const el = document.getElementById('messages');
  if (instant) el.scrollTop = el.scrollHeight;
  else el.scrollTo({ top: el.scrollHeight, behavior: 'smooth' });
}

function scrollToMsg(msgId) {
  const el = document.getElementById('msg-' + msgId);
  if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.style.outline = '1px solid var(--cyan-dim)'; setTimeout(() => el.style.outline = '', 1500); }
}

// ═══════════════════════════════════════════════════
//  CONTEXT MENU (right-click)
// ═══════════════════════════════════════════════════
function showCtxMenu(e, m, isMe) {
  hideCtxMenu();
  const canEdit = isMe;
  const canDel = isMe || me.role === 'admin';
  const menu = document.getElementById('ctx-menu');
  let items = '';
  // Encode body safely for onclick
  const safeBody = (m.body||'').slice(0,80).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' ');
  items += `<button class="ctx-item" onclick="replyToMsg(${m.id},'${esc(m.author)}','${safeBody}')">${t('ctx_reply')}</button>`;
  items += `<button class="ctx-item" onclick="forwardMsg(${m.id})">${t('ctx_forward')}</button>`;
  if (canEdit) items += `<div class="ctx-sep"></div><button class="ctx-item" onclick="editMsg(${m.id})">${t('ctx_edit')}</button>`;
  if (canDel) items += `<button class="ctx-item danger" onclick="deleteMsg(${m.id})">${t('ctx_delete')}</button>`;
  menu.innerHTML = items;

  const isMobile = window.innerWidth <= 640;
  if (isMobile) {
    // Add backdrop
    const bd = document.createElement('div');
    bd.id = 'ctx-backdrop';
    bd.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:299;';
    bd.onclick = hideCtxMenu;
    document.body.appendChild(bd);
    // Bottom sheet: CSS handles position via media query
    menu.style.left = '';
    menu.style.top = '';
    menu.style.display = 'block';
  } else {
    menu.style.display = 'block';
    const mw = menu.offsetWidth, mh = menu.offsetHeight;
    menu.style.left = Math.min(e.clientX, window.innerWidth - mw - 8) + 'px';
    menu.style.top = Math.min(e.clientY, window.innerHeight - mh - 8) + 'px';
  }
}

function hideCtxMenu() {
  document.getElementById('ctx-menu').style.display = 'none';
  document.getElementById('ctx-backdrop')?.remove();
}

document.addEventListener('click', (e) => { if (!e.target.closest('.ctx-menu')) hideCtxMenu(); });
document.addEventListener('contextmenu', (e) => {
  if (!e.target.closest('.msg')) hideCtxMenu();
});

// ═══════════════════════════════════════════════════
//  SEND / EDIT / DELETE
// ═══════════════════════════════════════════════════
async function sendMessage() {
  const input = document.getElementById('msg-input');
  const body = input.value.trim();
  const image = pendingImage;
  if (!body && !image) return;
  if (!activeConvId) return;

  const reply_to_id = replyTo?.id || null;
  input.value = '';
  input.style.height = 'auto';
  clearAttach();
  cancelReply();

  socket.emit('msg:send', { conv_id: activeConvId, body, image, reply_to_id }, (res) => {
    if (res?.error) toast('// ' + res.error, true);
  });

  // Stop typing
  if (isTyping) { socket.emit('typing:stop', { conv_id: activeConvId }); isTyping = false; }
}

//  REPLY
// ═══════════════════════════════════════════════════
function replyToMsg(msgId, author, body) {
  hideCtxMenu();
  replyTo = { id: msgId, author, body };
  document.getElementById('reply-preview').style.display = 'flex';
  document.getElementById('rp-author').textContent = author;
  document.getElementById('rp-text').textContent = body || '📎';
  document.getElementById('msg-input').focus();
}

function cancelReply() {
  replyTo = null;
  document.getElementById('reply-preview').style.display = 'none';
}

// ═══════════════════════════════════════════════════
let fwdMsgId = null;
function forwardMsg(msgId) {
  hideCtxMenu();
  fwdMsgId = msgId;
  document.getElementById('fwd-modal').classList.add('open');
  document.getElementById('fwd-search').value = '';
  document.getElementById('fwd-title').textContent = t('fwd_title');
  renderFwdConvs();
  document.getElementById('fwd-search').focus();
}

function renderFwdConvs() {
  const q = document.getElementById('fwd-search').value.toLowerCase().trim();
  let list = convs.filter(c => c.id !== activeConvId);
  if (q) list = list.filter(c => getConvDisplayName(c).toLowerCase().includes(q));
  document.getElementById('fwd-list').innerHTML = list.map(c => `
    <div class="user-pick" onclick="doForward(${c.id})">
      <span class="uname">${esc(getConvDisplayName(c))}</span>
      <span style="margin-left:auto;color:var(--text-dim);font-size:10px">${c.type === 'group' ? '👥' : '✉'}</span>
    </div>`).join('') || `<div style="padding:12px;color:var(--text-dim);font-size:11px">${t('not_found')}</div>`;
}
function filterFwdConvs() { renderFwdConvs(); }

async function doForward(toConvId) {
  if (!fwdMsgId) return;
  socket.emit('msg:forward', { msg_id: fwdMsgId, to_conv_id: toConvId }, (res) => {
    if (res?.error) { toast('// ' + res.error, true); return; }
    toast(t('fwd_sent'));
    document.getElementById('fwd-modal').classList.remove('open');
    fwdMsgId = null;
  });
}

function handleInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 150) + 'px';
}

async function editMsg(id) {
  const el = document.getElementById('msg-' + id);
  if (!el) return;
  const bodyEl = el.querySelector('.msg-body');
  const curText = bodyEl?.textContent || '';
  const newText = prompt(t('edit_prompt'), curText);
  if (newText === null || newText.trim() === curText) return;

  socket.emit('msg:edit', { msg_id: id, body: newText.trim() }, (res) => {
    if (res?.error) toast('// ' + res.error, true);
  });
}

async function deleteMsg(id) {
  if (!confirm(t('del_confirm'))) return;
  socket.emit('msg:delete', { msg_id: id }, (res) => {
    if (res?.error) toast('// ' + res.error, true);
  });
}

// ═══════════════════════════════════════════════════
function sendTyping() {
  if (!activeConvId || !socket) return;
  if (!isTyping) {
    isTyping = true;
    socket.emit('typing:start', { conv_id: activeConvId });
  }
  clearTimeout(typingTimer);
  typingTimer = setTimeout(() => {
    isTyping = false;
    socket.emit('typing:stop', { conv_id: activeConvId });
  }, 2000);
}

function renderTyping() {
  const names = Object.values(typingUsers);
  const area = document.getElementById('typing-area');
  const text = document.getElementById('typing-text');
  if (names.length === 0) { area.style.display = 'none'; return; }
  area.style.display = '';
  text.textContent = names.length === 1 ? t('typing_one', names[0]) : t('typing_many', names.length);
}

// ═══════════════════════════════════════════════════
//  IMAGE ATTACH
// ═══════════════════════════════════════════════════
async function handleAttach(input) {
  const file = input.files?.[0];
  if (!file) return;
  const formData = new FormData();
  formData.append('image', file);
  try {
    const res = await fetch('/api/upload', { method: 'POST', body: formData, credentials: 'same-origin' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    pendingImage = data.url;
    document.getElementById('attach-preview').src = data.url;
    document.getElementById('img-preview-bar').style.display = '';
  } catch(e) { toast('// ' + e.message, true); }
  input.value = '';
}

function clearAttach() {
  pendingImage = '';
  document.getElementById('img-preview-bar').style.display = 'none';
  document.getElementById('attach-preview').src = '';
}

function searchUsersForGroup() {
  clearTimeout(searchTimeout);

function renderGroupUsers() {
  const q = document.getElementById('group-search').value.toLowerCase().trim();
  let filtered = allUsers;
  if (q && allUsers === contactUsers) {
    filtered = allUsers.filter(u => u.username.toLowerCase().includes(q));
  }

  document.getElementById('group-results').innerHTML = filtered.map(u => `
    <div class="user-pick${groupSelectedIds.includes(u.id) ? ' selected' : ''}" onclick="toggleGroupUser(${u.id},'${esc(u.username)}')">
      <div class="conv-avatar" style="width:28px;height:28px;font-size:11px">${u.avatar_url ? `<img src="${esc(u.avatar_url)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">` : esc(u.username[0].toUpperCase())}</div>

async function saveGroupName() {

    await api('PUT', `/messenger/conversations/${activeConvId}/name`, { name });

async function uploadGroupAvatar(input) {
  const file = input.files?.[0];

  const formData = new FormData();
  formData.append('image', file);
  try {
    const res = await fetch('/api/upload', { method: 'POST', body: formData, credentials: 'same-origin' });

    if (!res.ok) throw new Error(data.error);
    await api('PUT', `/messenger/conversations/${activeConvId}/avatar`, { avatar_url: data.url });
    toast(t('gp_avatar_saved'));
    socket.emit('group:updated', { conv_id: activeConvId });
    await loadConversations();
    groupPanelData.avatar_url = data.url;
    renderGroupPanel();
  } catch(e) { toast('// ' + e.message, true); }
  input.value = '';
}

let dragC = 0;
document.addEventListener('dragenter', e => { e.preventDefault(); if (e.dataTransfer.types.includes('Files') && activeConvId) dragC++; });
document.addEventListener('dragleave', e => { e.preventDefault(); dragC--; });
document.addEventListener('dragover', e => e.preventDefault());

  const dt = new DataTransfer(); dt.items.add(file);

// ═══════════════════════════════════════════════════
//  WEBRTC VOICE CALL
// ═══════════════════════════════════════════════════
let localStream = null;
let peerConnection = null;
let activeCallConvId = null;

const rtcConfig = {
  iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
};

async function startVoiceCall() {
  if (!activeConvId) return;
  const other = convs.find(c => c.id === activeConvId)?.participants?.find(p => p.id !== me.id);
  if (!other || !isOnline(other.id)) {
    toast("User is offline", true);
    return;
  }
  
  activeCallConvId = activeConvId;
  document.getElementById('call-modal').classList.add('open');
  document.getElementById('call-title').textContent = other.username;
  document.getElementById('call-status').textContent = 'Calling...';
  document.getElementById('call-accept-btn').style.display = 'none';

  try {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      throw { name: 'NotSupported', message: 'Microphone requires HTTPS connection. Use localhost or enable HTTPS.' };
    }
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    createPeerConnection();
    localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
    
    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);
    
    socket.emit('webrtc-offer', { conv_id: activeCallConvId, offer });
  } catch (err) {
    console.error('Mic access error:', err);
    toast(err.name === 'NotAllowedError' ? 'Microphone access denied by browser' : 'Mic error: ' + err.message, true);
    closeCallUI();
  }
}

async function acceptCall() {
  document.getElementById('call-accept-btn').style.display = 'none';
  document.getElementById('call-status').textContent = 'Connecting...';
  try {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      throw { name: 'NotSupported', message: 'Microphone requires HTTPS connection. Use localhost or enable HTTPS.' };
    }
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
    
    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);
    
    socket.emit('webrtc-answer', { conv_id: activeCallConvId, answer });
    document.getElementById('call-status').textContent = 'Call connected';
  } catch (err) {
    console.error('Mic access error:', err);
    toast(err.name === 'NotAllowedError' ? 'Microphone access denied by browser' : 'Mic error: ' + err.message, true);
    endCall();
  }
}

function createPeerConnection() {
  peerConnection = new RTCPeerConnection(rtcConfig);
  
  peerConnection.onicecandidate = (event) => {
    if (event.candidate) {
      socket.emit('webrtc-candidate', { conv_id: activeCallConvId, candidate: event.candidate });
    }
  };
  
  peerConnection.ontrack = (event) => {
    const remoteAudio = document.getElementById('remote-audio');
    if (remoteAudio.srcObject !== event.streams[0]) {
      remoteAudio.srcObject = event.streams[0];
    }
  };
}

function endCall() {
  if (activeCallConvId) {
    socket.emit('webrtc-end', { conv_id: activeCallConvId });
  }
  closeCallUI();
}

function closeCallUI() {
  document.getElementById('call-modal').classList.remove('open');
  if (localStream) {
    localStream.getTracks().forEach(track => track.stop());
    localStream = null;
  }
  if (peerConnection) {
    peerConnection.close();
    peerConnection = null;
  }
  const remoteAudio = document.getElementById('remote-audio');
  remoteAudio.srcObject = null;
  activeCallConvId = null;
}

</script>
</body>
</html>
